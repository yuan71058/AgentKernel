app = 'agentkernel'

[build]
  dockerfile = 'Dockerfile'

[env]
  PROTOCOL = 'openai'
  MODEL = 'deepseek-chat'
  BASE_URL = 'https://api.deepseek.com'
  DATA_DIR = '/tmp/.aicore'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50
